<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Continental Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00b4d8;
            --text-main: #1d3557;
            --text-sec: #666;
            --bg-overlay: rgba(255, 255, 255, 0.92);
            --glass-bg: rgba(255, 255, 255, 0.96);
            --card-bg: rgba(255, 255, 255, 0.9);
            --input-bg: #fff;
            --border-color: #ddd;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --skeleton-bg: #e2e8f0;
            --skeleton-shine: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
        }

        body.dark-mode {
            --text-main: #f1faee;
            --text-sec: #a8b2d1;
            --bg-overlay: rgba(15, 23, 42, 0.95);
            --glass-bg: rgba(30, 41, 59, 0.98);
            --card-bg: rgba(30, 41, 59, 0.85);
            --input-bg: #1e293b;
            --border-color: #475569;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            --skeleton-bg: #334155;
            --skeleton-shine: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
        }

        html { direction: ltr; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }
        
        body {
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)),
                        url('https://images.unsplash.com/photo-1527633539154-739679619788?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* Navbar */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 4%; background: var(--glass-bg); backdrop-filter: blur(10px);
            box-shadow: var(--shadow); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border-color);
            height: 60px;
        }

        .nav-controls { display: flex; align-items: center; gap: 8px; }
        .brand-area { display: flex; align-items: center; justify-content: center; }
        .brand-name { font-size: 1.4rem; font-weight: 900; color: var(--primary); letter-spacing: 0.5px; }

        .theme-btn {
            background: transparent; border: 1px solid var(--border-color);
            color: var(--text-main); width: 32px; height: 32px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
        }

        /* Language Dropdown */
        .lang-dropdown { position: relative; display: inline-block; }
        .lang-btn {
            background: var(--input-bg); border: 1px solid var(--border-color); padding: 4px 10px 4px 4px;
            border-radius: 30px; cursor: pointer; display: flex; align-items: center; gap: 6px;
            color: var(--text-main); font-size: 0.85rem; height: 32px;
        }
        .flag-circle {
            width: 24px; height: 24px; border-radius: 50%; object-fit: cover;
            border: 1px solid var(--border-color); display: block;
        }
        .lang-menu {
            display: none; position: absolute; top: 110%; left: 0;
            background: var(--glass-bg); border-radius: 12px; box-shadow: var(--shadow);
            width: 140px; overflow: hidden; z-index: 2000; padding: 5px;
            border: 1px solid var(--border-color);
            text-align: left; 
        }
        .lang-menu.show { display: block; animation: fadeIn 0.2s; }
        .lang-option {
            padding: 8px 10px; display: flex; align-items: center; gap: 10px;
            cursor: pointer; font-size: 0.9rem; border-radius: 8px; color: var(--text-main);
        }
        .lang-option:hover { background: var(--primary); color: white; }
        .lang-option img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }

        /* Grid System */
        .container { padding: 15px 4%; width: 100%; max-width: 1400px; margin: 0 auto; }
        
        /* Search */
        .search-wrapper { position: relative; margin-bottom: 15px; width: 100%; }
        .search-input {
            width: 100%; padding: 12px 12px 12px 45px; border-radius: 25px;
            border: 1px solid var(--border-color); background: var(--glass-bg);
            backdrop-filter: blur(5px); color: var(--text-main); outline: none;
            box-shadow: var(--shadow); font-size: 1rem;
        }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-sec); font-size: 1.1rem; }

        .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; -ms-overflow-style: none; }
        .filters::-webkit-scrollbar { display: none; }
        
        .filter-btn {
            background: var(--glass-bg); border: 1px solid var(--border-color); padding: 6px 16px; border-radius: 20px;
            cursor: pointer; box-shadow: var(--shadow); white-space: nowrap; font-weight: bold;
            backdrop-filter: blur(5px); color: var(--text-main); font-size: 0.85rem;
        }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }

        .product-card {
            background: var(--card-bg); border-radius: 12px; padding: 10px;
            box-shadow: var(--shadow); position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            border: 1px solid var(--border-color);
        }
        
        .product-img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 8px; filter: brightness(1.02); }
        .product-card h3 { color: var(--text-main); margin-bottom: 2px; font-size: 0.95rem; line-height: 1.3; }
        .product-desc { color: var(--text-sec); font-size: 0.75rem; margin-bottom: 6px; opacity: 0.8; line-height: 1.2; min-height: 15px; }
        .product-card div.cat-tag { color: var(--primary); font-size: 0.7rem; margin-bottom: 8px; font-weight: bold; }
        
        .card-actions { width: 100%; margin-top: auto; }
        .add-btn {
            background: var(--primary); color: white; border: none; width: 100%;
            padding: 8px; border-radius: 8px; cursor: pointer; font-weight: bold;
            display: flex; justify-content: center; align-items: center; gap: 6px; font-size: 0.85rem;
        }
        .add-btn:active { transform: scale(0.95); }

        .card-qty-controls {
            display: flex; align-items: center; justify-content: space-between; background: var(--input-bg);
            border: 1px solid var(--primary); border-radius: 8px; overflow: hidden; width: 100%;
        }
        .c-qty-btn {
            background: var(--primary); color: white; border: none; width: 35px; height: 32px;
            cursor: pointer; font-size: 1rem; font-weight: bold; display: flex; align-items: center; justify-content: center;
        }
        .c-qty-val { font-weight: bold; color: var(--text-main); font-size: 1rem; flex: 1; text-align: center; }

        /* Skeleton Loading Styles */
        .skeleton {
            background-color: var(--skeleton-bg);
            position: relative; overflow: hidden; border-radius: 8px;
        }
        .skeleton::after {
            content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%); background-image: var(--skeleton-shine);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        
        .skeleton-img { width: 100%; height: 120px; margin-bottom: 8px; }
        .skeleton-title { width: 80%; height: 15px; margin-bottom: 8px; border-radius: 4px; }
        .skeleton-desc { width: 90%; height: 10px; margin-bottom: 6px; border-radius: 4px; }
        .skeleton-price { width: 50%; height: 18px; margin-bottom: 8px; border-radius: 4px; }
        .skeleton-btn { width: 100%; height: 35px; border-radius: 8px; margin-top: auto; }

        /* Cart */
        .cart-float {
            position: fixed; bottom: 20px; right: 20px; background: var(--primary);
            color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 1.3rem; box-shadow: 0 5px 15px rgba(0,0,0,0.2); cursor: pointer; z-index: 999;
        }
        .cart-badge {
            position: absolute; top: -2px; right: -2px; background: #e63946; width: 20px; height: 20px;
            border-radius: 50%; font-size: 0.7rem; display: flex; align-items: center; justify-content: center;
            border: 2px solid white; color: white;
        }
        .cart-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 3000; display: none; justify-content: flex-end;
        }
        .cart-panel {
            background: var(--glass-bg); width: 100%; max-width: 400px; height: 100%; padding: 20px;
            display: flex; flex-direction: column; animation: slideIn 0.3s; color: var(--text-main); backdrop-filter: blur(15px);
        }
        .cart-item-row { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-color); padding: 10px 0; }
        .cart-item-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .form-input {
            width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px;
            border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); outline: none; font-size: 1rem;
        }
        
        .success-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 5000; justify-content: center; align-items: center;
        }
        .success-box {
            background: white; padding: 25px; border-radius: 20px; text-align: center;
            animation: popIn 0.3s; width: 70%; max-width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .success-box i { font-size: 3.5rem; color: #2a9d8f; margin-bottom: 15px; }
        .success-box h2 { color: #333; margin: 0; font-size: 1.2rem; }

        /* Info Footer & WhatsApp */
        .info-footer {
            max-width: 800px; margin: 30px auto 10px auto; padding: 20px;
            background: var(--glass-bg); border: 1px solid var(--border-color); border-radius: 12px;
            text-align: center; box-shadow: var(--shadow); backdrop-filter: blur(5px);
        }
        .info-footer p { color: var(--text-main); font-size: 1rem; line-height: 1.6; margin-bottom: 15px; font-weight: bold; }
        .whatsapp-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            background-color: #25D366; color: white; text-decoration: none; padding: 10px 25px;
            border-radius: 25px; font-weight: bold; font-size: 1rem; transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }
        .whatsapp-btn:hover { transform: scale(1.05); background-color: #20ba56; color: white; }

        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        @media (max-width: 480px) {
            .brand-name { font-size: 1.1rem; }
            .nav-controls { gap: 5px; }
            #current-lang-text { display: none; }
            .lang-btn { padding: 4px; border-radius: 50%; width: 32px; justify-content: center; }
            .lang-btn i { display: none; } 
            .flag-circle { width: 22px; height: 22px; border: none; }
            .container { padding: 15px 3%; }
            .products-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .product-img { height: 100px; }
            .skeleton-img { height: 100px; }
        }
    </style>
</head>

            const flags = {en:'us.png', ar:'eg.png', ru:'ru.png', uk:'ua.png', de:'de.png', fr:'fr.png', es:'es.png'};
            const names = {en:'English', ar:'عربي', ru:'Русский', uk:'Українська', de:'Deutsch', fr:'Français', es:'Español'};
            setLang(currentLang, `https://flagcdn.com/w40/${flags[currentLang]}`, names[currentLang], true);

            // Show skeleton ONLY if cache is completely empty
            if(products.length > 0) {
                renderProducts();
            } else {
                renderSkeleton();
            }

            if(loadedCats.length > 0) renderCategories(loadedCats);
            updateCartUI();

            // Safety Timeout: if Firebase takes more than 4 seconds to load (or is blocked), kill skeleton
            setTimeout(() => {
                if (!isDataLoaded) {
                    isDataLoaded = true; // force data state
                    renderProducts(); // will show 'no products' if still empty
                }
            }, 4000);
        });

        function showSuccess(msg) {
            const overlay = document.getElementById('success-overlay');
            const msgEl = document.getElementById('success-msg');
            if(msg) msgEl.innerText = msg;
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; }, 1500);
        }

        function toggleLangMenu() { document.getElementById('lang-menu').classList.toggle('show'); }

        function setLang(code, flagImg, name, isInit = false) {
            currentLang = code;
            localStorage.setItem('lang', code);
            
            document.getElementById('current-flag-img').src = flagImg;
            document.getElementById('current-lang-text').innerText = name;
            document.getElementById('lang-menu').classList.remove('show');
            document.documentElement.lang = code;

            if(code === 'ar') {
                document.documentElement.dir = 'rtl';
                document.querySelector('.search-input').style.padding = '12px 45px 12px 12px';
                document.querySelector('.search-icon').style.left = 'auto';
                document.querySelector('.search-icon').style.right = '18px';
            } else {
                document.documentElement.dir = 'ltr';
                document.querySelector('.search-input').style.padding = '12px 12px 12px 45px';
                document.querySelector('.search-icon').style.left = '18px';
                document.querySelector('.search-icon').style.right = 'auto';
            }

            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if(dictionary[code][key]) el.innerText = dictionary[code][key];
            });
            document.getElementById('room-num').placeholder = dictionary[code].room_ph;
            document.getElementById('client-name').placeholder = dictionary[code].name_ph;
            document.getElementById('success-msg').innerText = dictionary[code].success;
            document.getElementById('search-input').placeholder = dictionary[code].search_ph;

            if(!isInit) {
                renderProducts(); renderCategories(); renderCart(); 
            }
        }

        // Firebase Listeners - Added error callbacks to prevent infinite loading
        db.ref('products').on('value', snap => {
            isDataLoaded = true;
            const data = snap.val();
            products = data ? Object.keys(data).map(k => ({id:k, ...data[k]})) : [];
            localStorage.setItem('cachedProducts', JSON.stringify(products)); 
            renderProducts();
        }, error => {
            console.error("Firebase read failed: ", error);
            isDataLoaded = true; // Stop skeleton even if error
            renderProducts();
        });

        db.ref('categories').on('value', snap => {
            const data = snap.val();
            loadedCats = data ? Object.values(data) : [];
            localStorage.setItem('cachedCats', JSON.stringify(loadedCats));
            renderCategories(loadedCats);
        });

        function renderCategories(cats = loadedCats) {
            const container = document.getElementById('categories-container');
            if(!cats.length) return; 
            
            let html = `<button class="filter-btn ${activeCategory==='all'?'active':''}" onclick="filter('all')">${dictionary[currentLang].all}</button>`;
            cats.forEach(c => {
                html += `<button class="filter-btn ${activeCategory===c?'active':''}" onclick="filter('${c}')">${c}</button>`;
            });
            container.innerHTML = html;
        }

        function filter(cat) {
            activeCategory = cat;
            renderCategories();
            renderProducts();
        }

        function handleSearch(val) {
            searchQuery = val.toLowerCase();
            renderProducts();
        }

        function renderSkeleton() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            for(let i=0; i<8; i++) {
                container.innerHTML += `
                    <div class="product-card">
                        <div class="skeleton skeleton-img"></div>
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-desc"></div>
                        <div class="skeleton skeleton-price"></div>
                        <div class="skeleton skeleton-btn"></div>
                    </div>
                `;
            }
        }

        function renderProducts() {
            const container = document.getElementById('products-container');
            
            // Only show skeleton if explicitly waiting for Firebase AND cache is empty
            if (!isDataLoaded && products.length === 0) {
                renderSkeleton();
                return;
            }

            container.innerHTML = '';
            
            let filtered = activeCategory === 'all' ? products : products.filter(p => p.category === activeCategory);

            if(searchQuery) {
                filtered = filtered.filter(p => p.name && p.name.toLowerCase().includes(searchQuery));
            }

            filtered.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product-card';
                
                const inCartItem = cart.find(item => item.id === p.id);
                
                let actionHTML = '';
                if(inCartItem) {
                    actionHTML = `
                        <div class="card-actions">
                            <div class="card-qty-controls">
                                <button class="c-qty-btn" onclick="updateQty('${p.id}', -1)">-</button>
                                <span class="c-qty-val">${inCartItem.qty}</span>
                                <button class="c-qty-btn" onclick="updateQty('${p.id}', 1)">+</button>
                            </div>
                        </div>
                    `;
                } else {
                    actionHTML = `
                        <div class="card-actions">
                            <button class="add-btn" onclick="addToCart('${p.id}')">
                                <i class="fa-solid fa-cart-plus"></i> ${dictionary[currentLang].add_cart}
                            </button>
                        </div>
                    `;
                }

                div.innerHTML = `
                    <img src="${p.image}" class="product-img" loading="lazy" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <div class="product-desc">${p.description || ''}</div>
                    <div style="font-weight:bold; color:var(--primary); margin-bottom:5px; font-size:1.1rem;">
                        ${p.price || ''} <span style="font-size:0.85rem">${p.currency || ''}</span>
                    </div>
                    <div class="cat-tag">${p.category}</div>
                    ${actionHTML}
                `;
                container.appendChild(div);
            });

            // Show empty state message if no products match
            if(filtered.length === 0) {
                container.innerHTML = `<p style="text-align:center; width:100%; grid-column:1/-1; color:var(--text-sec); padding:20px;">${dictionary[currentLang].empty_state}</p>`;
            }
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            const exists = cart.find(x => x.id === id);
            if(exists) exists.qty++;
            else cart.push({...p, qty: 1});
            updateGlobalState();
        }

        function updateQty(id, change) {
            const index = cart.findIndex(x => x.id === id);
            if(index !== -1) {
                cart[index].qty += change;
                if(cart[index].qty <= 0) {
                    cart.splice(index, 1);
                }
            }
            updateGlobalState();
        }

        function updateGlobalState() {
            localStorage.setItem('cachedCart', JSON.stringify(cart));
            renderCart();
            updateCartUI();
            renderProducts();
        }

        function updateCartUI() {
            const count = cart.reduce((a,b) => a+b.qty, 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-count').style.display = count > 0 ? 'flex' : 'none';
        }

        function toggleCart() {
            const m = document.getElementById('cart-modal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
            renderCart();
        }

        function renderCart() {
            const div = document.getElementById('cart-items');
            div.innerHTML = '';
            if(!cart.length) {
                div.innerHTML = `<p style="text-align:center; color:var(--text-sec); margin-top:50px">${dictionary[currentLang].empty_cart}</p>`;
                return;
            }
            cart.forEach((item, idx) => {
                div.innerHTML += `
                    <div class="cart-item-row">
                        <img src="${item.image}" class="cart-item-img" loading="lazy">
                        <div style="flex:1">
                            <div style="font-weight:bold; color:var(--text-main); font-size:0.95rem;">${item.name}</div>
                            <div style="color:var(--primary); font-weight:bold; font-size:0.85rem; margin-top:2px;">
                                ${item.price || ''} ${item.currency || ''}
                            </div>
                            <div class="qty-controls" style="display:flex; align-items:center; gap:10px; margin-top:5px; background:var(--input-bg); border:1px solid var(--border-color); padding:2px 8px; border-radius:15px; width:fit-content;">
                                <button onclick="updateQty('${item.id}', -1)" style="border:none; background:none; color:var(--text-main); font-weight:bold; cursor:pointer;">-</button>
                                <span style="font-weight:bold; font-size:0.9rem;">${item.qty}</span>
                                <button onclick="updateQty('${item.id}', 1)" style="border:none; background:none; color:var(--text-main); font-weight:bold; cursor:pointer;">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function placeOrder() {
            const name = document.getElementById('client-name').value;
            const room = document.getElementById('room-num').value;
            const btn = document.getElementById('confirm-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            
            if(!name || !room || !cart.length) {
                alert('Please enter Name, Room Number and ensure Cart is not empty');
                return;
            }

            btn.disabled = true; 
            const originalText = btnText.innerText;
            const originalIconClass = btnIcon.className;
            
            btnText.innerText = dictionary[currentLang].processing;
            btnIcon.className = "fa-solid fa-spinner fa-spin"; 
            
            const order = {
                items: cart,
                clientName: name,
                room: room,
                status: 'pending',
                timestamp: Date.now()
            };

            db.ref('orders/active').push(order)
                .then(() => {
                    showSuccess(dictionary[currentLang].success);
                    cart = [];
                    updateGlobalState();
                    toggleCart();
                    document.getElementById('room-num').value = '';
                    document.getElementById('client-name').value = '';
                })
                .catch(err => {
                    alert("Error: " + err.message);
                })
                .finally(() => {
                    btn.disabled = false;
                    btnText.innerText = originalText;
                    btnIcon.className = originalIconClass;
                });
        }

        window.onclick = function(e) {
            if(!e.target.closest('.lang-dropdown')) {
                document.getElementById('lang-menu').classList.remove('show');
            }
        }
    </script>
</body>
</html>
